<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { cinzel: ['Cinzel','serif'], inter: ['Inter','sans-serif'] }
    }
  }
}
</script>
<style>
  body { background:#0a0a0f; font-family:'Inter',sans-serif; }
  .cinzel { font-family:'Cinzel',serif; }
  img.pixelated { image-rendering: pixelated; image-rendering: crisp-edges; }
  .skeleton { background: linear-gradient(90deg,#1e1e2e 25%,#2a2a3e 50%,#1e1e2e 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .item-tooltip { display:none; }
  .item-box:hover .item-tooltip { display:block; }
</style>
</head>
<body class="text-slate-200 min-h-screen">

<!-- HEADER -->
<header class="border-b border-[#1e1e2e] px-4 py-3 flex items-center gap-4 sticky top-0 z-10" style="background:linear-gradient(90deg,#0a0a0f,#110a1f)">
  <button onclick="history.back()" class="flex items-center gap-2 text-slate-500 hover:text-[#c084fc] transition-colors text-sm">
    <span class="text-lg">←</span> Volver
  </button>
  <div class="w-px h-5 bg-[#1e1e2e]"></div>
  <div>
    <div class="cinzel text-sm font-bold text-[#c084fc]">⚔ Equipamiento</div>
    <div id="char-name" class="text-xs text-slate-500">—</div>
  </div>
</header>

<div class="max-w-2xl mx-auto px-4 py-6 space-y-6" id="main-content">
  <!-- Skeleton -->
  <div id="skeleton" class="space-y-6">
    <div>
      <div class="skeleton h-4 w-24 rounded mb-4"></div>
      <div class="flex flex-wrap gap-3">
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
      </div>
    </div>
    <div>
      <div class="skeleton h-4 w-24 rounded mb-4"></div>
      <div class="flex flex-wrap gap-3">
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
      </div>
    </div>
    <div>
      <div class="skeleton h-4 w-24 rounded mb-4"></div>
      <div class="flex flex-wrap gap-3">
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
      </div>
    </div>
    <div>
      <div class="skeleton h-4 w-24 rounded mb-4"></div>
      <div class="flex flex-wrap gap-3">
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
        <div class="skeleton rounded-xl" style="width:96px;height:96px"></div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div id="content" class="hidden space-y-6">
    <div id="section-weapons"></div>
    <div id="section-armor"></div>
    <div id="section-wings"></div>
    <div id="section-accessories"></div>
  </div>

  <!-- Error -->
  <div id="error" class="hidden text-center py-16 text-red-400">
    <div class="text-4xl mb-3">⚠️</div>
    <div class="text-sm">No se pudo cargar el equipamiento.</div>
    <button onclick="history.back()" class="mt-4 text-xs text-slate-500 hover:text-[#c084fc] transition-colors">← Volver</button>
  </div>
</div>

<script src="scriptEquip.js">

</script>
</body>
</html>
